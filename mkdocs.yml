site_name: Grace Young Adults
site_url: https://example.com
copyright: >-
  Scripture quotations via <a href="https://www.biblegateway.com" target="_blank">BibleGateway</a>.
  NIV&reg; &copy; <a href="https://www.biblica.com" target="_blank">Biblica, Inc.</a> &mdash;
  ESV&reg; &copy; <a href="https://www.crossway.org" target="_blank">Crossway</a> &mdash;
  NLT &copy; <a href="https://www.tyndale.com" target="_blank">Tyndale House</a> &mdash;
  NKJV&reg; &copy; <a href="https://www.thomasnelson.com" target="_blank">Thomas Nelson</a> &mdash;
  CJB&reg; &copy; <a href="https://messianicjewish.net" target="_blank">David H. Stern</a>
docs_dir: source
site_dir: docs

hooks:
  - hooks.py

theme:
  name: material
  custom_dir: overrides
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

extra_javascript:
  - assets/javascripts/translation.js

markdown_extensions:
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - The Olive Tree:
    - the-olive-tree/index.md
  - Anger:
    - anger/index.md
  - Anxiety:
    - relieving-anxiety/index.md
    - End of the World: relieving-anxiety/end-of-the-world.md
    - Government: relieving-anxiety/government.md
    - Planning for the Future: relieving-anxiety/planning-for-the-future.md
  - Together:
    - together/index.md
    - With God: together/with-god.md
    - With Friends: together/with-friends.md
    - With Singleness: together/with-singleness.md
    - With Your Spouse: together/with-your-spouse.md
    - With Your Church: together/with-your-church.md
    - With Your Community: together/with-your-community.md
